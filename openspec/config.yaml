schema: spec-driven

context: |
  ## Project: OSS Growth Index
  A co-branded quarterly website by Supabase and >commit VC (commit.fund) that ranks
  the top 200 fastest-growing open source GitHub organizations each quarter.

  ## Tech Stack
  - Framework: Next.js 16 (App Router) — NOTE: this is a newer version with breaking changes
  - Language: TypeScript 5
  - Styling: Tailwind CSS v4 (breaking changes from v3 — no tailwind.config.js, CSS-first config)
  - UI primitives: Base UI (@base-ui/react), shadcn components
  - Table: @tanstack/react-table v8
  - Charts: Recharts v3
  - Icons: lucide-react
  - Data (current): CSV files in /data/, parsed server-side via src/lib/data.ts with papaparse
  - Data (future): Supabase (Postgres), client in src/lib/supabase.ts
  - Utilities: clsx, tailwind-merge, class-variance-authority

  ## File Structure
  - src/app/ — Next.js App Router pages
    - page.tsx — Home: ranked table for both tiers
    - layout.tsx — Root layout with fonts and global styles
    - org/[slug]/page.tsx — Org detail page
    - methodology/page.tsx — Methodology explanation page
  - src/components/ — Shared React components
    - org-table.tsx — Main ranked table component
    - repo-table.tsx — Repository table for org detail
    - growth-chart.tsx — Time series chart using Recharts
    - org-logo.tsx — Organization logo with fallback
    - site-header.tsx / site-footer.tsx — Layout chrome
    - share-button.tsx — Social sharing
    - ui/ — shadcn/base-ui primitives (button, table, badge, card, separator)
  - src/lib/ — Server utilities
    - data.ts — CSV parsing functions: getAbove1000(), getBelow1000(), getFrontendData()
    - supabase.ts — Supabase client
    - utils.ts — cn() utility
  - src/types/index.ts — Core types: OrgEntry, FrontendOrgData, RepoEntry, TimeSeriesPoint, Tier

  ## Core Domain Types
  - OrgEntry: per-organization quarterly metrics (stars, contributors, npm/pypi/huggingface
    downloads and likes — each with start, end, growth_rate, growth_percentile, final_weight)
  - Tier: "above_1000" | "below_1000" (two independent leaderboards by star count)
  - FrontendOrgData: enriched org data with time series and repo list for detail page
  - Growth score: composite of weighted percentile ranks across all signals

  ## Design System
  - Dark mode primary: near-black background (#1C1C1C Supabase dark), high-contrast foreground
  - Accent color: Supabase green (#3ECF8E)
  - Typography: Geist Sans for UI, Geist Mono for numbers/rankings/data
  - Anti-patterns: no soft shadows, no rounded-card-everywhere, no pastel charts, no startup-landing energy
  - Principles: data is the hero, developer credibility, prestige through restraint, Supabase DNA

  ## Conventions
  - Server components by default; client components only when needed (use "use client")
  - Data fetching is server-side via lib/data.ts functions (no client-side fetching currently)
  - Slug derived from github_owner_url via extractSlug() utility
  - Conditional rendering based on null/undefined values (many fields are nullable)
  - Component styling via cn() (clsx + tailwind-merge)
  - No test suite currently; lint via ESLint (eslint-config-next)

  ## Audience
  Primary: developers and OSS maintainers. Secondary: founders, VCs, and investors.
  The interface must read as credible and data-authoritative to both groups.

rules:
  proposal:
    - Keep proposals focused on data presentation and developer credibility
    - Always specify whether a change affects the home table, org detail, or both
    - Include a "Non-goals" section to prevent scope creep
    - Consider both tiers (above_1000 / below_1000) when proposing table changes
  tasks:
    - Break tasks into small, independently shippable chunks
    - Prefer editing existing components over creating new ones
    - Note when a task requires "use client" and justify why
    - Flag any changes that affect the data layer (lib/data.ts or types/index.ts)
