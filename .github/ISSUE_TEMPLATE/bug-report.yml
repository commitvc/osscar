name: Bug Report
description: Report a bug in the OSS Growth Index website or tooling
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (website)
        - Methodology (scoring pipeline)
        - Data
        - Documentation
    validations:
      required: true
